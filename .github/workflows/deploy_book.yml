name: deploy-book

on:
  push:
    branches:
      - main

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9
        
    - name: Install dependencies
      run: |
        pip install -U jupyter-book
        
    - name: Build the book
      run: |
        jupyter-book build Tuan/jupyter_book
        
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: Tuan/jupyter_book/_build/html
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
